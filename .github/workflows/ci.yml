name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and typecheck
        run: bun run check

      - name: Build web app
        run: bun run build

      - name: Build API image
        run: docker build -t imediasave-api:test -f Dockerfile .

      - name: Build web image
        run: docker build -t imediasave-web:test -f web/Dockerfile .
