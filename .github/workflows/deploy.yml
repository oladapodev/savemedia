name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'savemedia' }}
  REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  ARTIFACT_REPO: ${{ vars.GCP_ARTIFACT_REPO || 'savemedia' }}
  API_IMAGE_NAME: ${{ vars.GCP_API_IMAGE_NAME || 'api' }}
  WEB_IMAGE_NAME: ${{ vars.GCP_WEB_IMAGE_NAME || 'web' }}
  API_SERVICE_NAME: ${{ vars.GCP_API_SERVICE_NAME || 'savemedia-api' }}
  WEB_SERVICE_NAME: ${{ vars.GCP_WEB_SERVICE_NAME || 'savemedia-web' }}
  API_KEYS_SECRET_NAME: ${{ vars.GCP_API_KEYS_SECRET_NAME || 'savemedia-api-keys' }}
  WEB_API_KEY_SECRET_NAME: ${{ vars.GCP_WEB_API_KEY_SECRET_NAME || 'savemedia-web-api-key' }}
  API_COOKIES_SECRET_NAME: ${{ vars.GCP_API_COOKIES_SECRET_NAME || 'savemedia-api-cookies' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Build web app
        run: bun run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build API image
        run: |
          docker build \
            --file ./Dockerfile \
            --tag "${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${API_IMAGE_NAME}:latest" \
            .

      - name: Push API image
        run: docker push "${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${API_IMAGE_NAME}:latest"

      - name: Build web image
        run: |
          docker build \
            --file ./web/Dockerfile \
            --tag "${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${WEB_IMAGE_NAME}:latest" \
            .

      - name: Push web image
        run: docker push "${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${WEB_IMAGE_NAME}:latest"

      - name: Sync Cloud Run secrets
        env:
          API_KEY_VALUE: ${{ secrets.SAVEMEDIA_API_SHARED_KEY }}
          SAVEMEDIA_COOKIES_JSON: ${{ secrets.SAVEMEDIA_COOKIES_JSON }}
        run: ./scripts/setup-cloudrun-secrets.sh

      - name: Deploy API service
        run: ./scripts/deploy-api-run.sh

      - name: Deploy web service
        run: ./scripts/deploy-web-run.sh

      - name: Sync service URLs
        run: ./scripts/sync-cloudrun-urls.sh
