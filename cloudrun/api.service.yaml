apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: imediasave-api
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 2
      timeoutSeconds: 900
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/imediasave/api:latest
          ports:
            - containerPort: 8080
          env:
            - name: API_URL
              value: https://api.example.com/
            - name: API_PORT
              value: "8080"
            - name: CORS_WILDCARD
              value: "0"
            - name: CORS_URL
              value: https://app.example.com
            - name: API_AUTH_REQUIRED
              value: "1"
            - name: API_KEY_URL
              value: file:///var/run/secrets/imediasave/keys.json
            - name: COOKIE_PATH
              value: /var/run/secrets/imediasave/cookies.json
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: imediasave-secrets
              mountPath: /var/run/secrets/imediasave
              readOnly: true
      volumes:
        - name: imediasave-secrets
          secret:
            secretName: imediasave-cobalt-runtime
            items:
              - key: keys.json
                path: keys.json
              - key: cookies.json
                path: cookies.json
