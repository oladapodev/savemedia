apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: imediasave-web
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "20"
    spec:
      containerConcurrency: 40
      timeoutSeconds: 900
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/imediasave/web:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: PUBLIC_APP_URL
              value: https://app.example.com
            - name: COBALT_API_URL
              value: https://api.example.com
            - name: COBALT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: imediasave-web-config
                  key: cobalt-api-key
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
